<!doctype html>
<html lang="hi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ABM AI Search</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <canvas id="abmNeuralBg"></canvas>
    <div class="stage" id="stage">
      <div class="logo">
        <span class="a">A</span><span class="b">B</span><span class="m">M</span>
        <span style="width: 12px"></span>
        <svg
          class="chip"
          width="62"
          height="62"
          viewBox="0 0 58 58"
          xmlns="http://www.w3.org/2000/svg"
          aria-label="AI"
        >
          <polygon
            points="29,7 50,18.5 50,39.5 29,51 8,39.5 8,18.5"
            fill="none"
            stroke="#ffc83d"
            stroke-width="2.5"
          />
          <text
            x="29"
            y="36.5"
            font-family="Sora, sans-serif"
            font-weight="700"
            font-size="22"
            fill="#ffc83d"
            text-anchor="middle"
          >
            AI
          </text>
          <g stroke="#c70505" stroke-width="2" stroke-linecap="round">
            <line x1="8" y1="25" x2="1" y2="25" />
            <line x1="8" y1="33" x2="1" y2="33" />
            <line x1="50" y1="25" x2="57" y2="25" />
            <line x1="50" y1="33" x2="57" y2="33" />
          </g>
        </svg>
      </div>
      <div class="tagline">
        &middot; Accelerating with <b>Artificial Intelligence</b> &middot;
      </div>
      <div class="controls">
        <button class="new-chat" id="newChat" onclick="newChat()">
          + New Chat
        </button>
      </div>
      <div class="searchbox">
        <textarea
          id="msg"
          rows="2"
          placeholder="Ask anything - who won IPL 2026, sum of 4 and 5, or any question..."
        ></textarea>
      </div>

      <div class="controls">
        <!-- <div class="kbd-hint">
          <span>&#8984;</span> / <span>Ctrl</span> + <span>Enter</span> to
          search
        </div> -->
        <div class="select-shell">
          <label for="mode" style="display: none">Select Tool</label>
          <select id="mode" title="Select tool (default: smart route)">
            <option value="auto">🧭 Smart Route (auto)</option>
            <option value="web_search">🔍 Web Search</option>
            <option value="get_stock_price">💹 Finance</option>
            <option value="get_weather">🌤️ Weather</option>
            <option value="fetch_url">📄 Explain Me</option>
            <option value="calculate">🧮 Calculator</option>
          </select>
        </div>
        <button class="go" id="send" onclick="send()">Ask &rarr;</button>
      </div>
    </div>

    <!-- conversation thread: bubbles get appended here -->
    <div class="thread" id="thread" style="display: none"></div>
    <div
      id="chartContainer"
      style="display: none; max-width: 600px; margin: 20px auto"
    >
      <canvas id="myChart"></canvas>
    </div>

    <script>
      // keeps the conversation session alive across requests
      let sessionId = null;

      const modeLabels = {
        auto: "🧭 smart route",
        calculate: "🧮 calculator",
        fetch_url: "📄 explain me",
        get_stock_price: "💹 finance",
        get_weather: "🌤️ weather",
        web_search: "🔍 web search",
      };

      // create a bubble element and append to the thread
      function addBubble(role, htmlContent, routeLabel) {
        const thread = document.getElementById("thread");
        thread.style.display = "flex";

        const row = document.createElement("div");
        row.className = "bubble-row " + role; // "user" or "ai"

        if (role === "ai" && routeLabel) {
          const tag = document.createElement("div");
          tag.className = "bubble-tag";
          tag.textContent = routeLabel;
          row.prepend(tag);
        }

        const bubble = document.createElement("div");
        bubble.className = "bubble " + role;
        bubble.innerHTML = htmlContent;
        row.prepend(bubble);

        thread.prepend(row);
        // auto-scroll to newest
        row.scrollIntoView({ behavior: "smooth", block: "end" });
        return bubble;
      }

      async function send() {
        const btn = document.getElementById("send");
        const msg = document.getElementById("msg").value.trim();
        const stage = document.getElementById("stage");
        const mode = document.getElementById("mode").value;
        if (!msg) return;

        stage.classList.add("compact");

        // 1. add user bubble
        addBubble("user", escapeHtml(msg));

        // 2. add a placeholder AI bubble (thinking)
        const routeLabel = modeLabels[mode];
        const thinkingText =
          mode === "auto"
            ? "\u25B8 smart routing your request..."
            : "\u25B8 routing to " + routeLabel + "...";
        const aiBubble = addBubble("ai", thinkingText, routeLabel);
        aiBubble.classList.add("thinking");

        // clear input right away
        document.getElementById("msg").value = "";
        document.getElementById("msg").style.height = "auto";
        btn.disabled = true;

        try {
          const res = await fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              message: msg,
              mode: mode,
              session_id: sessionId,
            }),
          });
          const data = await res.json();
          sessionId = data.session_id;
          // 3. replace thinking bubble content with real answer
          aiBubble.classList.remove("thinking");
          aiBubble.innerHTML = marked.parse(
            data.answer || "*(empty response)*",
          );
          // Chart bhi usi bubble ke andar
          if (data.chart_data) {
            const canvas = document.createElement("canvas");
            canvas.id = "myChart_" + Date.now(); // unique id
            canvas.style.marginTop = "16px";
            aiBubble.appendChild(canvas);
            renderChart(data.chart_data, canvas);
          }

          aiBubble.scrollIntoView({ behavior: "smooth", block: "end" });
        } catch (e) {
          aiBubble.classList.remove("thinking");
          aiBubble.classList.add("error");
          aiBubble.textContent = "\u2715 Error: " + e.message;
        } finally {
          btn.disabled = false;
        }
      }

      async function newChat() {
        if (sessionId) {
          try {
            await fetch("/new", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ session_id: sessionId }),
            });
          } catch (e) {
            /* ignore */
          }
        }
        sessionId = null;
        document.getElementById("msg").value = "";
        const thread = document.getElementById("thread");
        thread.innerHTML = "";
        thread.style.display = "none";
        document.getElementById("stage").classList.remove("compact");
      }

      // render chart using Chart.js with given data, destroy previous chart if exists
      let chartInstance = null;

      function renderChart(chartData, canvas) {
        const container = document.getElementById("chartContainer");
        container.style.display = "block";

        // purana chart destroy karo
        if (chartInstance) {
          chartInstance.destroy();
        }

        chartInstance = new Chart(canvas, {
          type: chartData.type,
          data: {
            labels: chartData.labels,
            datasets: [
              {
                label: chartData.title || "Chart",
                data: chartData.values,
                backgroundColor: [
                  "#e63c1e",
                  "#d4730a",
                  "#e8a020",
                  "#f0c040",
                  "#cc4e2a",
                  "#c70505",
                ],
                borderWidth: 1,
              },
            ],
          },
          options: {
            responsive: true,
            plugins: {
              legend: { display: true },
              title: {
                display: !!chartData.title,
                text: chartData.title,
              },
            },
          },
        });
      }

      // basic HTML escaping for user text
      function escapeHtml(str) {
        const div = document.createElement("div");
        div.textContent = str;
        return div.innerHTML;
      }

      const ta = document.getElementById("msg");
      ta.addEventListener("input", () => {
        ta.style.height = "auto";
        ta.style.height = Math.min(ta.scrollHeight, 320) + "px";
      });
      ta.addEventListener("keydown", (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key === "Enter") {
          e.preventDefault();
          send();
        }
      });

      // animated neural background on canvas

      (function () {
        const canvas = document.getElementById("abmNeuralBg");
        const ctx = canvas.getContext("2d");
        let W,
          H,
          nodes = [],
          pulses = [];

        const COLORS = ["#e63c1e", "#cc4e2a", "#d4730a", "#e8a020", "#f0c040"];

        function hexToRgb(hex) {
          return {
            r: parseInt(hex.slice(1, 3), 16),
            g: parseInt(hex.slice(3, 5), 16),
            b: parseInt(hex.slice(5, 7), 16),
          };
        }

        function resize() {
          W = canvas.width = window.innerWidth;
          H = canvas.height = window.innerHeight;
          init();
        }

        function init() {
          nodes = [];
          pulses = [];
          const count = 48;
          for (let i = 0; i < count; i++) {
            const angle = Math.random() * Math.PI * 2;
            const spd = 0.12 + Math.random() * 0.18;
            nodes.push({
              x: Math.random() * W,
              y: Math.random() * H,
              vx: Math.cos(angle) * spd,
              vy: Math.sin(angle) * spd,
              r: 1.8 + Math.random() * 2,
              color: COLORS[Math.floor(Math.random() * COLORS.length)],
              /* pulse glow phase — each node breathes */
              phase: Math.random() * Math.PI * 2,
              phaseSpeed: 0.012 + Math.random() * 0.018,
            });
          }
        }

        /* fire a signal pulse from node i → node j */
        function spawnPulse(i, j) {
          pulses.push({
            from: i,
            to: j,
            t: 0 /* 0 = start, 1 = end */,
            speed: 0.008 + Math.random() * 0.012,
            color: nodes[i].color,
          });
        }

        let pulseTimer = 0;

        function draw() {
          ctx.clearRect(0, 0, W, H);
          const MAX_DIST = 130;

          /* ── 1. connections ── */
          for (let i = 0; i < nodes.length; i++) {
            for (let j = i + 1; j < nodes.length; j++) {
              const dx = nodes[i].x - nodes[j].x;
              const dy = nodes[i].y - nodes[j].y;
              const dist = Math.sqrt(dx * dx + dy * dy);
              if (dist < MAX_DIST) {
                const alpha = (1 - dist / MAX_DIST) * 0.15;
                const { r, g, b } = hexToRgb(nodes[i].color);
                ctx.beginPath();
                ctx.moveTo(nodes[i].x, nodes[i].y);
                ctx.lineTo(nodes[j].x, nodes[j].y);
                ctx.strokeStyle = `rgba(${r},${g},${b},${alpha})`;
                ctx.lineWidth = 0.6;
                ctx.stroke();
              }
            }
          }

          /* ── 2. pulse signals travelling along edges ── */
          pulses = pulses.filter((p) => p.t <= 1);
          for (const p of pulses) {
            const A = nodes[p.from],
              B = nodes[p.to];
            if (!A || !B) continue;
            const x = A.x + (B.x - A.x) * p.t;
            const y = A.y + (B.y - A.y) * p.t;
            const { r, g, b } = hexToRgb(p.color);

            /* outer glow ring */
            const grd = ctx.createRadialGradient(x, y, 0, x, y, 7);
            grd.addColorStop(0, `rgba(${r},${g},${b},0.7)`);
            grd.addColorStop(0.4, `rgba(${r},${g},${b},0.25)`);
            grd.addColorStop(1, `rgba(${r},${g},${b},0)`);
            ctx.beginPath();
            ctx.arc(x, y, 7, 0, Math.PI * 2);
            ctx.fillStyle = grd;
            ctx.fill();

            /* bright core dot */
            ctx.beginPath();
            ctx.arc(x, y, 2.2, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${r},${g},${b},0.95)`;
            ctx.fill();

            p.t += p.speed;
          }

          /* ── 3. nodes with breathing glow ── */
          for (const n of nodes) {
            n.phase += n.phaseSpeed;
            const breathe = 0.35 + 0.25 * Math.sin(n.phase); /* 0.1 → 0.6 */
            const { r, g, b } = hexToRgb(n.color);

            /* soft halo */
            const halo = ctx.createRadialGradient(
              n.x,
              n.y,
              0,
              n.x,
              n.y,
              n.r * 5,
            );
            halo.addColorStop(
              0,
              `rgba(${r},${g},${b},${(breathe * 0.4).toFixed(2)})`,
            );
            halo.addColorStop(1, `rgba(${r},${g},${b},0)`);
            ctx.beginPath();
            ctx.arc(n.x, n.y, n.r * 5, 0, Math.PI * 2);
            ctx.fillStyle = halo;
            ctx.fill();

            /* solid core */
            ctx.beginPath();
            ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${r},${g},${b},${breathe.toFixed(2)})`;
            ctx.fill();

            /* move */
            n.x += n.vx;
            n.y += n.vy;
            if (n.x < 0 || n.x > W) n.vx *= -1;
            if (n.y < 0 || n.y > H) n.vy *= -1;
          }

          /* ── 4. spawn pulses periodically ── */
          pulseTimer++;
          if (pulseTimer % 18 === 0) {
            /* pick two nearby nodes randomly */
            const i = Math.floor(Math.random() * nodes.length);
            const MAX_DIST2 = 130;
            const candidates = [];
            for (let j = 0; j < nodes.length; j++) {
              if (j === i) continue;
              const dx = nodes[i].x - nodes[j].x;
              const dy = nodes[i].y - nodes[j].y;
              if (Math.sqrt(dx * dx + dy * dy) < MAX_DIST2) candidates.push(j);
            }
            if (candidates.length) {
              const j =
                candidates[Math.floor(Math.random() * candidates.length)];
              spawnPulse(i, j);
            }
          }

          requestAnimationFrame(draw);
        }

        window.addEventListener("resize", resize);
        resize();
        draw();
      })();
    </script>
  </body>
</html>
