<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="darkreader-lock" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ABM AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      html,
      body,
      #root {
        margin: 0;
        padding: 0;
        background: #0a0a0b;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes breathe {
        0%,
        100% {
          transform: scale(1);
          box-shadow:
            0 0 60px rgba(230, 60, 30, 0.35),
            inset 0 0 40px rgba(255, 200, 61, 0.16);
        }
        50% {
          transform: scale(1.045);
          box-shadow:
            0 0 85px rgba(230, 60, 30, 0.5),
            inset 0 0 55px rgba(255, 200, 61, 0.24);
        }
      }
      .nexus-textarea:focus {
        border-color: #c70505 !important;
        box-shadow:
          0 0 0 3px rgba(199, 5, 5, 0.15),
          0 0 30px rgba(199, 5, 5, 0.2);
      }
      .new-chat-btn:hover {
        border-color: #e0a418 !important;
        color: #ffc83d !important;
        box-shadow: 0 0 16px rgba(255, 200, 61, 0.25);
      }
      .nexus-textarea {
        box-shadow: 0 0 40px rgba(199, 5, 5, 0.4);
      }
      .nexus-textarea:focus {
        border-color: #c70505 !important;
        box-shadow: 0 0 30px rgba(199, 5, 5, 0.6) !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
